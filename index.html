<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Aktivitets-checklista</title>

<style>
body{
  font-family:sans-serif;
  background:#f5f5f5;
  text-align:center;
  padding:20px;
  max-width:900px;
  margin:auto;
}

h2{margin-bottom:10px;}

.section{
  background:white;
  padding:12px;
  margin:10px auto;
  border-radius:12px;
}

input{
  width:90%;
  padding:8px;
  margin:6px;
  border-radius:8px;
  border:1px solid #ddd;
}

.step{
  border:1px solid #eee;
  border-radius:10px;
  padding:10px;
  margin:8px 0;
}

img{
  max-height:100px;
  margin-top:6px;
  border-radius:8px;
}

.smallBtn{
  background:#eee;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin:3px;
}

.tool-row{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:15px;
  flex-wrap:wrap;
}

.tool-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}

.tool-btn .icon{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid #333;
  font-size:26px;
  background:white;
}

.tool-btn .label{
  margin-top:6px;
  font-size:13px;
}

#preview{
  display:none;
  text-align:left;
}
</style>
</head>

<body>

<h2>Digital Aktivitets-checklista</h2>

<div class="section">
  <input id="title" placeholder="Titel på checklistan" oninput="updateData()">
</div>

<div id="steps"></div>

<button onclick="addStep()">➕ Lägg till steg</button>

<div class="tool-row">

  <div class="tool-btn" onclick="saveChecklist()">
    <div class="icon">💾</div>
    <div class="label">Spara</div>
  </div>

  <div class="tool-btn" onclick="loadChecklist()">
    <div class="icon">📂</div>
    <div class="label">Öppna</div>
  </div>

  <div class="tool-btn" onclick="exportJSON()">
    <div class="icon">⬇️</div>
    <div class="label">Ladda ner</div>
  </div>

  <div class="tool-btn" onclick="importJSON()">
    <div class="icon">⬆️</div>
    <div class="label">Ladda upp</div>
  </div>

</div>

<br>

<button onclick="generatePreview()">▶️ Generera preview</button>
<button onclick="downloadHTML()">⬇️ Ladda ner HTML</button>

<div id="templateList" class="section" style="display:none;"></div>
<div id="preview" class="section"></div>

<script>

let checklistData = { title:"", steps:[] };

// 🔥 FIX: samma struktur som gamla buildern
let stream = null;
let recorder = null;
let chunks = [];
let currentStepIndex = null;

/* ===== MIC ===== */

async function initMic(){
  if(!stream){
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }
}

/* ===== RENDER ===== */

function render(){
  const container=document.getElementById("steps");
  container.innerHTML="";

  checklistData.steps.forEach((step,i)=>{

    const div=document.createElement("div");
    div.className="section step";

    div.innerHTML=`
      <b>Steg ${i+1}</b><br>

      <input value="${step.text||''}" placeholder="Beskrivning"
      oninput="checklistData.steps[${i}].text=this.value">

      <br>

      <div style="display:flex; align-items:center; gap:8px;">
        <span>📷</span>
        <input type="file" onchange="loadImage(event,${i})">
      </div>

      ${step.img ? `<img src="${step.img}">` : ''}

      <div style="display:flex; align-items:center; gap:8px;">
        <span>🔊</span>
        <input type="file" accept="audio/*" onchange="loadAudio(event,${i})">
        ${step.audio ? `<span>✔</span>` : ''}
      </div>

      <button class="smallBtn" onclick="startRec(${i})">🎤 Spela in</button>
      <button class="smallBtn" onclick="stopRec()">⏹ Stoppa</button>
      <button class="smallBtn" onclick="playRec(${i})">▶️ Lyssna</button>

      <br>

      <button class="smallBtn" onclick="moveUp(${i})">⬆️</button>
      <button class="smallBtn" onclick="moveDown(${i})">⬇️</button>
      <button class="smallBtn" onclick="removeStep(${i})">🗑</button>
    `;

    container.appendChild(div);
  });
}

/* ===== STEG ===== */

function addStep(){
  checklistData.steps.push({});
  render();
}

function removeStep(i){
  checklistData.steps.splice(i,1);
  render();
}

function moveUp(i){
  if(i===0)return;
  [checklistData.steps[i-1],checklistData.steps[i]] =
  [checklistData.steps[i],checklistData.steps[i-1]];
  render();
}

function moveDown(i){
  if(i===checklistData.steps.length-1)return;
  [checklistData.steps[i],checklistData.steps[i+1]] =
  [checklistData.steps[i+1],checklistData.steps[i]];
  render();
}

/* ===== BILD ===== */

function loadImage(e,i){
  const r=new FileReader();
  r.onload=()=>{
    checklistData.steps[i].img=r.result;
    render();
  };
  r.readAsDataURL(e.target.files[0]);
}

/* ===== LJUD UPLOAD ===== */

function loadAudio(e,i){
  const file=e.target.files[0];
  if(!file) return;

  const url=URL.createObjectURL(file);
  checklistData.steps[i].audio=url;
}

/* ===== LJUD INSPELNING (FIXAD) ===== */

async function startRec(i){

  await initMic();

  currentStepIndex = i;
  chunks = [];

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    const blob = new Blob(chunks,{type:'audio/webm'});

    const r = new FileReader();
    r.onload = () => {
      checklistData.steps[currentStepIndex].audio = r.result;
      render();
    };

    r.readAsDataURL(blob);
  };

  recorder.start();
}

function stopRec(){
  if(recorder && recorder.state === "recording"){
    recorder.stop();
  }
}

function playRec(i){
  if(checklistData.steps[i].audio){
    new Audio(checklistData.steps[i].audio).play();
  } else {
    alert("Ingen inspelning finns");
  }
}

/* ===== DATA ===== */

function updateData(){
  checklistData.title=document.getElementById("title").value;
}

/* ===== PREVIEW ===== */

function generatePreview(){

  updateData();

  let html=`<h3>${checklistData.title}</h3>`;

  checklistData.steps.forEach((s,i)=>{
    html+=`
      <div>
      <b>Steg ${i+1}</b><br>
      ${s.text||""}<br>
      ${s.img ? `<img src="${s.img}">` : ''}
      ${s.audio ? `<button onclick="new Audio('${s.audio}').play()">▶️</button>` : ''}
      <br><input type="checkbox"> Klart
      </div><br>
    `;
  });

  const preview=document.getElementById("preview");
  preview.innerHTML=html;
  preview.style.display="block";
}

/* INIT */
addStep();

</script>

</body>
</html>
